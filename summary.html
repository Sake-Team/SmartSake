<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SmartSake — Run Summary</title>
	<link rel="stylesheet" href="styles.css">
	<style>
		body { background: var(--color-bg); color: var(--color-text-1); margin: 0; }
		main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
		.back-link { font-size: .82rem; color: var(--color-text-2); text-decoration: none; }
		.back-link:hover { color: var(--color-text-1); }

		.summary-header { margin-bottom: 20px; }
		.summary-header h1 { font-size: 1.3rem; margin: 0 0 4px; }
		.summary-header .meta { font-size: .85rem; color: var(--color-text-3); }

		.summary-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
		.summary-table th {
			text-align: center; padding: 6px 8px;
			border-bottom: 2px solid var(--color-border);
			color: var(--color-text-3); font-weight: 600; font-size: .75rem;
			text-transform: uppercase; position: sticky; top: 0;
			background: var(--color-bg);
		}
		.summary-table th.hour-col { text-align: left; width: 60px; }
		.summary-table td {
			padding: 5px 8px; border-bottom: 1px solid var(--color-border);
			text-align: center; font-variant-numeric: tabular-nums;
		}
		.summary-table td.hour-cell { text-align: left; font-weight: 600; color: var(--color-text-2); }
		.summary-table tr:hover td { background: var(--color-bg-subtle); }

		/* Zone group header spanning 3 sub-columns */
		.zone-group { border-bottom: 2px solid var(--color-border); }
		.sub-header th {
			font-size: .7rem; font-weight: 500; color: var(--color-text-3);
			border-bottom: 1px solid var(--color-border); padding: 3px 8px;
		}

		.val-min { color: var(--clr-alarm-low, #5b9bd5); }
		.val-max { color: var(--clr-alarm-high, #e06050); }
		.val-avg { font-weight: 600; }

		.empty-msg { color: var(--color-text-3); font-size: .85rem; padding: 40px 0; text-align: center; }
	</style>
	<script src="customize.js" defer></script>
</head>
<body>
<header class="header">
	<div class="header-inner">
		<a href="home.html" class="back-link">Home</a>
		<h1 class="header-title">Run Summary</h1>
	</div>
</header>

<main>
	<div class="summary-header" id="summary-header">
		<h1 id="run-name">Loading...</h1>
		<div class="meta" id="run-meta"></div>
	</div>

	<div id="table-wrap">
		<p class="empty-msg">Loading summary...</p>
	</div>
</main>

<script>
(function () {
	'use strict';

	var params = new URLSearchParams(location.search);
	var runId = params.get('run');
	if (!runId) {
		document.getElementById('table-wrap').innerHTML = '<p class="empty-msg">No run specified. Use ?run=ID</p>';
		return;
	}

	// Fetch run info + summary in parallel
	Promise.all([
		fetch('/api/runs/' + runId).then(function (r) { return r.ok ? r.json() : null; }),
		fetch('/api/runs/' + runId + '/summary').then(function (r) { return r.ok ? r.json() : []; })
	]).then(function (results) {
		var run = results[0];
		var summary = results[1];

		if (!run) {
			document.getElementById('table-wrap').innerHTML = '<p class="empty-msg">Run not found.</p>';
			return;
		}

		// Header
		document.getElementById('run-name').textContent = run.name;
		var started = run.started_at ? new Date(run.started_at) : null;
		var ended = run.ended_at ? new Date(run.ended_at) : null;
		var metaParts = [];
		if (started) metaParts.push(started.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
		if (started && ended) {
			var hrs = Math.round((ended - started) / 3600000);
			metaParts.push(hrs + 'h total');
		}
		metaParts.push(run.status);
		document.getElementById('run-meta').textContent = metaParts.join(' — ');

		if (!summary.length) {
			document.getElementById('table-wrap').innerHTML = '<p class="empty-msg">No sensor data for this run.</p>';
			return;
		}

		// Figure out which zones have data
		var activeZones = [];
		for (var z = 1; z <= 6; z++) {
			var hasData = summary.some(function (row) { return row.zones[z]; });
			if (hasData) activeZones.push(z);
		}

		// Build table
		var html = '<table class="summary-table">';

		// Zone group headers
		html += '<thead><tr class="zone-group"><th class="hour-col" rowspan="2">Hour</th>';
		activeZones.forEach(function (z) {
			html += '<th colspan="3">Zone ' + z + '</th>';
		});
		html += '</tr><tr class="sub-header">';
		activeZones.forEach(function () {
			html += '<th>Min</th><th>Avg</th><th>Max</th>';
		});
		html += '</tr></thead><tbody>';

		summary.forEach(function (row) {
			html += '<tr><td class="hour-cell">' + row.hour + '</td>';
			activeZones.forEach(function (z) {
				var d = row.zones[z];
				if (d) {
					html += '<td class="val-min">' + d.min.toFixed(1) + '</td>';
					html += '<td class="val-avg">' + d.avg.toFixed(1) + '</td>';
					html += '<td class="val-max">' + d.max.toFixed(1) + '</td>';
				} else {
					html += '<td>—</td><td>—</td><td>—</td>';
				}
			});
			html += '</tr>';
		});

		html += '</tbody></table>';
		document.getElementById('table-wrap').innerHTML = html;
	}).catch(function () {
		document.getElementById('table-wrap').innerHTML = '<p class="empty-msg">Error loading summary.</p>';
	});
})();
</script>
</body>
</html>
