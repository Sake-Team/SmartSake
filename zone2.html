<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Zone 2</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="zone-page">
    <header>
      <div class="header-inner">
        <img src="images/VoidSakeLogo.jpg" alt="Smart Sake logo" class="sake-logo-egg">
        <h1 class="header-title">Zone 2 <span id="run-name-display" class="run-name-header"></span></h1>
      </div>
    <div class="header-actions">
      <div class="header-datetime" id="header-datetime"></div>
    </div>
  </header>
    <main>
      <div class="stage">
        <section class="layout">
          <section class="zones">
            <a class="zone" href="zone1.html" role="button" aria-label="Zone 1">Zone 1</a>
            <a class="zone zone--active" href="zone2.html" role="button" aria-label="Zone 2">Zone 2</a>
            <a class="zone" href="zone3.html" role="button" aria-label="Zone 3">Zone 3</a>
            <a class="zone" href="zone4.html" role="button" aria-label="Zone 4">Zone 4</a>
            <a class="zone" href="zone5.html" role="button" aria-label="Zone 5">Zone 5</a>
            <a class="zone" href="zone6.html" role="button" aria-label="Zone 6">Zone 6</a>
          </section>

          <div class="left">
            <!-- Temperature display -->
            <div class="long long--top-left zone-temp-card">
              <span class="zone-temp-label">Zone 2 Temperature</span>
              <div class="zone-temp-readout">
                <span id="zone-dry-temp" class="zone-big-temp">--</span>
                <span class="zone-big-unit">°C</span>
                <span class="zone-wet-label">wet-bulb: <span id="zone-wet-temp">--</span> °C</span>
              </div>
            </div>

            <!-- Setpoint + mode controls -->
            <div class="long long--top-left zone-control-card">
              <div class="zone-control-row">
                <label class="zone-control-label" for="setpoint-input">Setpoint (°C)</label>
                <div class="zone-setpoint-row">
                  <input type="number" id="setpoint-input" class="zone-setpoint-input"
                    min="0" max="60" step="0.5" value="38.0" aria-label="Setpoint temperature">
                  <button id="setpoint-apply" class="zone-apply-btn">Apply</button>
                </div>
              </div>
              <div class="zone-control-row zone-mode-row">
                <span class="zone-control-label">Mode</span>
                <div class="zone-mode-btns">
                  <button id="mode-auto" class="zone-mode-btn zone-mode-btn--active" data-mode="auto">Auto (PID)</button>
                  <button id="mode-manual" class="zone-mode-btn" data-mode="manual">Manual</button>
                </div>
              </div>
            </div>

            <!-- Fan manual controls -->
            <div class="mid-row" id="manual-controls">
              <button class="mid" id="fan-on-btn" disabled>Fan ON</button>
              <button class="mid" id="fan-off-btn" disabled>Fan OFF</button>
            </div>

            <!-- Alarm threshold settings -->
            <details class="zone-alarm-settings">
              <summary class="zone-alarm-settings-toggle">Alarm Thresholds</summary>
              <div class="zone-alarm-settings-grid">
                <label class="zone-thr-label">Warn High<input type="number" id="thr-warn-high" class="zone-setpoint-input" step="0.5" min="0" max="60" placeholder="42.0"></label>
                <label class="zone-thr-label">Crit High<input type="number" id="thr-crit-high" class="zone-setpoint-input" step="0.5" min="0" max="60" placeholder="45.0"></label>
                <label class="zone-thr-label">Warn Low<input type="number" id="thr-warn-low" class="zone-setpoint-input" step="0.5" min="0" max="60" placeholder="30.0"></label>
                <label class="zone-thr-label">Crit Low<input type="number" id="thr-crit-low" class="zone-setpoint-input" step="0.5" min="0" max="60" placeholder="25.0"></label>
                <button id="thresholds-apply" class="zone-apply-btn zone-thr-apply">Apply</button>
              </div>
            </details>

            <!-- Alarm banner -->
            <div class="zone-alarm-banner" id="alarm-banner" style="display:none">
              <span class="zone-alarm-icon" id="alarm-icon">&#9888;</span>
              <span id="alarm-reason">--</span>
            </div>

            <!-- Status row -->
            <div class="zone-status-row">
              <div class="zone-status-chip" id="relay-indicator">
                <span class="zone-status-dot zone-status-dot--off" id="relay-dot"></span>
                <span id="relay-label">Fan OFF</span>
              </div>
              <div class="zone-status-chip">
                PID output: <span id="pid-output">--</span>%
              </div>
            </div>
          </div>

          <div class="notes" aria-label="Notes">
            <a class="home-link" href="index.html">&#8592; Home</a>
            <div class="notes__label">Notes</div>
            <label class="sr-only" for="notes-input">Notes</label>
            <textarea id="notes-input" class="notes__input"
              placeholder="Enter notes..." aria-label="Notes input"></textarea>
          </div>
        </section>
      </div>
    </main>

    <script>
    (function () {
      const ZONE = 2;

      // ---- Run name ----
      const savedRunName = localStorage.getItem('currentRunName');
      if (savedRunName) {
        const el = document.getElementById('run-name-display');
        if (el) el.textContent = '- ' + savedRunName;
      }

      // ---- Notes ----
      (function () {
        const notesInput = document.getElementById('notes-input');
        if (!notesInput) return;
        const saved = localStorage.getItem('currentNotes');
        if (saved) notesInput.value = saved;
        let t;
        notesInput.addEventListener('input', function () {
          clearTimeout(t);
          t = setTimeout(function () { localStorage.setItem('currentNotes', notesInput.value); }, 500);
        });
        notesInput.addEventListener('blur', function () {
          clearTimeout(t);
          localStorage.setItem('currentNotes', notesInput.value);
        });
      })();

      // ---- Zone state polling ----
      const dryEl      = document.getElementById('zone-dry-temp');
      const wetEl      = document.getElementById('zone-wet-temp');
      const relayDot   = document.getElementById('relay-dot');
      const relayLabel = document.getElementById('relay-label');
      const pidOut     = document.getElementById('pid-output');
      const setpointIn = document.getElementById('setpoint-input');
      const modeAuto   = document.getElementById('mode-auto');
      const modeManual = document.getElementById('mode-manual');
      const fanOn      = document.getElementById('fan-on-btn');
      const fanOff     = document.getElementById('fan-off-btn');
      const alarmBanner  = document.getElementById('alarm-banner');
      const alarmReason  = document.getElementById('alarm-reason');
      const thrWarnHigh  = document.getElementById('thr-warn-high');
      const thrCritHigh  = document.getElementById('thr-crit-high');
      const thrWarnLow   = document.getElementById('thr-warn-low');
      const thrCritLow   = document.getElementById('thr-crit-low');

      let currentMode = 'auto';

      function fmtTemp(v) { return (Math.round(v / 0.2) * 0.2).toFixed(1); } function computeWetBulbC(TdbC, RH) {
        const R = Math.min(100, Math.max(1, RH));
        return TdbC * Math.atan(0.151977 * Math.sqrt(R + 8.313659)) +
               Math.atan(TdbC + R) - Math.atan(R - 1.676331) +
               0.00391838 * Math.pow(R, 1.5) * Math.atan(0.023101 * R) - 4.686035;
      }

      async function pollSensorData() {
        try {
          const res = await fetch('sensor_latest.json?_=' + Date.now());
          if (!res.ok) return;
          const data = await res.json();

          // Temperature
          const tcKey = 'TC' + ZONE;
          const dryC = data.thermocouples && data.thermocouples[tcKey] != null
            ? parseFloat(data.thermocouples[tcKey]) : null;
          const RH = data.sht30 && data.sht30.humidity_rh != null
            ? parseFloat(data.sht30.humidity_rh) : null;

          if (dryEl) dryEl.textContent = dryC != null ? fmtTemp(dryC) : '--';
          if (wetEl && dryC != null && RH != null)
            wetEl.textContent = fmtTemp(computeWetBulbC(dryC, RH));

          // Zone PID state
          const zone = data.zones && data.zones[ZONE];
          if (zone) {
            if (!document.activeElement || document.activeElement !== setpointIn)
              setpointIn.value = fmtTemp(parseFloat(zone.setpoint_c));

            currentMode = zone.mode;
            modeAuto.classList.toggle('zone-mode-btn--active', zone.mode === 'auto');
            modeManual.classList.toggle('zone-mode-btn--active', zone.mode === 'manual');

            fanOn.disabled  = (zone.mode !== 'manual');
            fanOff.disabled = (zone.mode !== 'manual');

            const on = zone.relay_state;
            relayDot.className = 'zone-status-dot ' + (on ? 'zone-status-dot--on' : 'zone-status-dot--off');
            fanOn.classList.toggle('mid--fan-active',  on === true);
            fanOff.classList.toggle('mid--fan-active', on === false && currentMode === 'manual');
            relayLabel.textContent = on ? 'Fan ON' : 'Fan OFF';
            if (pidOut) pidOut.textContent = zone.pid_output != null ? zone.pid_output : '--';
            // Alarm state
            if (alarmBanner) {
              const level = zone.alarm_level;
              if (level) {
                alarmBanner.style.display = '';
                alarmBanner.className = 'zone-alarm-banner zone-alarm-banner--' + level;
                if (alarmReason) alarmReason.textContent = zone.alarm_reason || '';
              } else {
                alarmBanner.style.display = 'none';
              }
            }

            // Populate threshold inputs (skip if field is focused)
            if (zone.alarm_thresholds) {
              const t = zone.alarm_thresholds;
              if (thrWarnHigh && document.activeElement !== thrWarnHigh) thrWarnHigh.value = t.warn_high_c ?? '';
              if (thrCritHigh && document.activeElement !== thrCritHigh) thrCritHigh.value = t.crit_high_c ?? '';
              if (thrWarnLow  && document.activeElement !== thrWarnLow)  thrWarnLow.value  = t.warn_low_c  ?? '';
              if (thrCritLow  && document.activeElement !== thrCritLow)  thrCritLow.value  = t.crit_low_c  ?? '';
            }
          }
        } catch (e) {
          console.warn('Zone poll error:', e);
        }
      }

      pollSensorData();
      setInterval(pollSensorData, 5000);

      // ---- POST helper ----
      async function postZoneUpdate(payload) {
        try {
          const res = await fetch('/update_zone', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zone: ZONE, ...payload })
          });
          if (!res.ok) console.warn('Zone update failed:', await res.text());
          else pollSensorData(); // refresh immediately
        } catch (e) {
          console.warn('Zone POST error:', e);
        }
      }

      // ---- Setpoint apply ----
      document.getElementById('setpoint-apply').addEventListener('click', function () {
        const sp = parseFloat(setpointIn.value);
        if (!isNaN(sp) && sp >= 0 && sp <= 60) postZoneUpdate({ setpoint_c: sp });
      });

      // ---- Mode buttons ----
      modeAuto.addEventListener('click', function () { postZoneUpdate({ mode: 'auto' }); });
      modeManual.addEventListener('click', function () { postZoneUpdate({ mode: 'manual' }); });

      // ---- Manual fan controls ----
      fanOn.addEventListener('click',  function () { postZoneUpdate({ mode: 'manual', manual_state: true  }); });
      fanOff.addEventListener('click', function () { postZoneUpdate({ mode: 'manual', manual_state: false }); });

      // ---- Alarm threshold apply ----
      document.getElementById('thresholds-apply').addEventListener('click', function () {
        const wh = parseFloat(thrWarnHigh.value);
        const ch = parseFloat(thrCritHigh.value);
        const wl = parseFloat(thrWarnLow.value);
        const cl = parseFloat(thrCritLow.value);
        if ([wh, ch, wl, cl].some(isNaN)) return;
        postZoneUpdate({ alarm_thresholds: { warn_high_c: wh, crit_high_c: ch, warn_low_c: wl, crit_low_c: cl } });
      });
    })();
    </script>
  <script>
(function() {
  function updateHeaderTime() {
    var el = document.getElementById("header-datetime");
    if (!el) return;
    var now = new Date();
    var dateStr = now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    var timeStr = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    el.innerHTML = dateStr + "<br>" + timeStr;
  }
  updateHeaderTime();
  setInterval(updateHeaderTime, 1000);
})();
</script>
</body>
</html>
