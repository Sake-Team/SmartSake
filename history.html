<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>SmartSake — Batch History</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
	<link rel="stylesheet" href="styles.css">
	<style>
		/* ── Page chrome ────────────────────────────────────────── */
		body { background: var(--color-bg); color: var(--color-text-1); margin: 0; }
		.back-link { font-size: .82rem; color: var(--color-text-2); text-decoration: none; }
		.back-link:hover { color: var(--color-text-1); }

		main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

		/* ── Cards / sections ────────────────────────────────────── */
		.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--r-md); box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 18px; }
		.card h2 { font-size: 1rem; font-weight: 700; margin: 0 0 14px; }

		/* ── Run list ────────────────────────────────────────────── */
		.run-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
		.run-table th { text-align: left; padding: 6px 10px; border-bottom: 2px solid var(--color-border); color: var(--color-text-3); font-weight: 600; font-size: .78rem; text-transform: uppercase; }
		.run-table td { padding: 8px 10px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
		.run-table tr:hover td { background: var(--color-bg-subtle); }
		.run-table tr.is-selected td { background: var(--color-bg-tinted); }
		.badge { display: inline-block; font-size: .72rem; padding: 1px 7px; border-radius: var(--r-pill); }
		.badge--completed { background: var(--color-success-bg); color: var(--color-success); }
		.badge--crashed { background: var(--color-critical-bg); color: var(--color-critical); }
		.badge--active { background: rgba(21,126,251,0.1); color: var(--color-accent); }

		/* ── Metadata editor ─────────────────────────────────────── */
		.meta-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
		.meta-form label { display: flex; flex-direction: column; gap: 4px; font-size: .82rem; color: var(--color-text-2); }
		.meta-form input, .meta-form select, .meta-form textarea {
			border: 1px solid var(--color-border); border-radius: var(--r-sm); padding: 5px 8px;
			font-size: .85rem; font-family: inherit; background: var(--color-bg-subtle); color: var(--color-text-1);
		}
		.meta-save-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
		.save-status { font-size: .8rem; color: var(--color-success); }

		/* ── Lock button ──────────────────────────────────────────── */
		.lock-btn {
			background: var(--color-bg-subtle); border: 1px solid var(--color-border);
			border-radius: var(--r-sm); padding: 3px 10px; font-size: .78rem;
			cursor: pointer; color: var(--color-text-3); white-space: nowrap;
		}
		.lock-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
		.lock-btn.lock-on { background: var(--color-success-bg); color: var(--color-success); border-color: var(--color-success); font-weight: 600; }
		.lock-btn:disabled { opacity: .5; cursor: not-allowed; }

		/* ── Buttons — rely on styles.css canonical .btn system ── */

		/* ── No-select panel ─────────────────────────────────────── */
		.no-select-hint { color: var(--color-text-3); font-size: .85rem; text-align: center; padding: 30px 0; }

		@media (max-width: 680px) {
			.corr-grid { grid-template-columns: 1fr; }
			.meta-form { grid-template-columns: 1fr; }
		}
	</style>
	<script src="customize.js" defer></script>
</head>
<body>
<div class="page-wrapper">
<header class="header">
	<div class="header-inner">
		<img src="images/VoidSakeLogo.jpg" alt="Smart Sake logo" class="sake-logo-egg">
		<h1 class="header-title">Batch History</h1>
		<button id="settings-btn" class="settings-btn" type="button" aria-label="Open settings" title="Settings">&#9881;</button>
	</div>
	<div class="header-right">
		<a href="home.html" class="back-link">&larr; Home</a>
	</div>
</header>

<main>
	<div id="tab-runs">
		<div class="card">
			<h2>All Batches</h2>
			<div id="run-list-wrap">
				<p style="color:var(--color-text-3);font-size:.85rem;">Loading…</p>
			</div>
		</div>

		<div class="card" id="meta-card" style="display:none;">
			<h2 id="meta-card-title">Batch Metadata</h2>
			<form id="meta-form" class="meta-form">
				<label>
					Koji variety
					<select name="koji_variety">
						<option value="">— select —</option>
						<option value="yellow">Yellow</option>
						<option value="white">White</option>
						<option value="black">Black</option>
						<option value="other">Other</option>
					</select>
				</label>
				<label>
					Inoculation rate (%)
					<input type="number" name="inoculation_rate" step="0.01" min="0" max="100" placeholder="e.g. 0.1">
				</label>
				<label>
					Source rice
					<input type="text" name="source_rice" placeholder="e.g. Yamadanishiki">
				</label>
				<label>
					Polish ratio (%)
					<input type="number" name="polish_ratio" min="0" max="100" placeholder="e.g. 70">
				</label>
			</form>
			<div class="meta-save-row">
				<button type="button" class="btn btn-primary" id="meta-save-btn">Save</button>
				<span class="save-status" id="save-status" aria-live="polite"></span>
			</div>
		</div>
	</div>


</main>

<script>
(function () {
	"use strict";

	/* ── Utility ───────────────────────────────────────────────── */
	function fmtDate(iso) {
		if (!iso) return '—';
		const d = new Date(iso);
		return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
			+ ' · '
			+ d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
	}

	function fmtDuration(startIso, endIso) {
		if (!startIso) return '—';
		const start = new Date(startIso);
		const end = endIso ? new Date(endIso) : new Date();
		const diffMs = end - start;
		if (diffMs < 0) return '—';
		const hours = Math.floor(diffMs / 3600000);
		const days = Math.floor(hours / 24);
		const remHours = hours % 24;
		if (days > 0) return days + 'd ' + remHours + 'h';
		if (hours > 0) return hours + 'h ' + Math.floor((diffMs % 3600000) / 60000) + 'm';
		return Math.floor(diffMs / 60000) + 'm';
	}

	/* ── Run list ───────────────────────────────────────────────── */
	let _runs = [];
	let _selectedRunId = null;

	function loadRuns() {
		fetch('/api/runs')
			.then(r => r.json())
			.then(runs => {
				_runs = runs;
				renderRunList(runs);
				// If ?run= param, pre-select
				const urlRun = Number(new URLSearchParams(location.search).get('run'));
				if (urlRun) selectRun(urlRun);
			})
			.catch(() => {
				document.getElementById('run-list-wrap').innerHTML =
					'<p style="color:var(--color-critical);font-size:.85rem;">Failed to load runs.</p>';
			});
	}

	function renderRunList(runs) {
		const wrap = document.getElementById('run-list-wrap');
		if (!runs.length) {
			wrap.innerHTML = '<p style="color:var(--color-text-3);font-size:.85rem;">No runs yet.</p>';
			return;
		}
		const rows = runs.map(r => {
			const statusCls = r.status === 'completed' ? 'badge--completed' :
			                  r.status === 'crashed'   ? 'badge--crashed' : 'badge--active';
			const durText = fmtDuration(r.started_at, r.ended_at);
			const durDisplay = (!r.ended_at && r.status === 'active')
				? durText + ' <span style="color:var(--color-accent);font-size:.78rem;">(ongoing)</span>'
				: durText;
			const lockCls = r.pinned ? 'lock-on' : '';
			return `<tr data-id="${r.id}" class="${_selectedRunId === r.id ? 'is-selected' : ''}">
				<td><button class="lock-btn ${lockCls}" data-pin="${r.id}" title="${r.pinned ? 'Unlock — data can be auto-deleted when disk space is low' : 'Lock — keeps raw data forever'}">${r.pinned ? 'Locked' : 'Lock'}</button></td>
				<td>${r.name}</td>
				<td>${fmtDate(r.started_at)}</td>
				<td>${r.ended_at ? fmtDate(r.ended_at) : '—'}</td>
				<td>${durDisplay}</td>
				<td><span class="badge ${statusCls}">${r.status}</span></td>
				<td>${r.koji_variety || '—'}</td>
				<td><button class="btn btn-secondary btn-sm" data-select="${r.id}">Edit</button></td>
			</tr>`;
		}).join('');
		wrap.innerHTML = `<table class="run-table">
			<thead><tr>
				<th></th><th>Name</th><th>Started</th><th>Ended</th><th>Duration</th><th>Status</th><th>Koji variety</th><th></th>
			</tr></thead>
			<tbody>${rows}</tbody>
		</table>`;
		wrap.querySelectorAll('[data-select]').forEach(btn => {
			btn.addEventListener('click', () => selectRun(Number(btn.dataset.select)));
		});
		wrap.querySelectorAll('[data-pin]').forEach(btn => {
			btn.addEventListener('click', function (e) {
				e.stopPropagation();
				const rid = Number(btn.dataset.pin);
				const run = _runs.find(r => r.id === rid);
				if (!run) return;
				const newPinned = !run.pinned;
				if (!newPinned && !confirm('Unlock this run? Raw data can be auto-deleted when disk space runs low.')) return;
				btn.disabled = true;
				fetch('/api/runs/' + rid + '/pin', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ pinned: newPinned })
				}).then(function () {
					run.pinned = newPinned ? 1 : 0;
					btn.textContent = newPinned ? 'Locked' : 'Lock';
					btn.title = newPinned ? 'Unlock — data can be auto-deleted when disk space is low' : 'Lock — keeps raw data forever';
					btn.classList.toggle('lock-on', newPinned);
					btn.disabled = false;
				}).catch(function () { btn.disabled = false; });
			});
		});
	}

	function selectRun(runId) {
		_selectedRunId = runId;
		const run = _runs.find(r => r.id === runId);
		if (!run) return;
		// Update table highlight
		document.querySelectorAll('.run-table tr[data-id]').forEach(tr => {
			tr.classList.toggle('is-selected', Number(tr.dataset.id) === runId);
		});
		// Show metadata card
		const card = document.getElementById('meta-card');
		card.style.display = '';
		document.getElementById('meta-card-title').textContent = 'Metadata — ' + run.name;
		// Populate form from metadata
		fetch(`/api/runs/${runId}/metadata`)
			.then(r => r.json())
			.then(meta => populateMetaForm(meta))
			.catch(() => {});
	}

	function populateMetaForm(meta) {
		const form = document.getElementById('meta-form');
		const fields = ['koji_variety', 'inoculation_rate', 'source_rice', 'polish_ratio'];
		fields.forEach(f => {
			const el = form.elements[f];
			if (el) el.value = meta[f] != null ? meta[f] : '';
		});
		document.getElementById('save-status').textContent = '';
	}

	/* ── Save metadata ───────────────────────────────────────────── */
	document.getElementById('meta-save-btn').addEventListener('click', () => {
		if (!_selectedRunId) return;
		const form = document.getElementById('meta-form');
		const data = {
			koji_variety:      form.elements['koji_variety'].value || null,
			inoculation_rate:  form.elements['inoculation_rate'].value !== '' ? Number(form.elements['inoculation_rate'].value) : null,
			source_rice:       form.elements['source_rice'].value || null,
			polish_ratio:      form.elements['polish_ratio'].value !== '' ? Number(form.elements['polish_ratio'].value) : null,
		};
		const statusEl = document.getElementById('save-status');
		statusEl.textContent = 'Saving…';
		fetch(`/api/runs/${_selectedRunId}/metadata`, {
			method: 'PATCH',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify(data),
		})
			.then(r => r.json())
			.then(() => {
				statusEl.textContent = 'Saved';
				setTimeout(() => { statusEl.textContent = ''; }, 2500);
			})
			.catch(() => { statusEl.textContent = 'Error saving'; });
	});

	/* ── Init ─────────────────────────────────────────────────────── */
	loadRuns();
})();
</script>
</div>
</body>
</html>
