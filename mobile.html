<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SmartSake</title>
<link rel="stylesheet" href="styles.css">
<script src="chart.min.js" defer></script>
<style>
  /* ── Mobile overrides ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    /* Force dark — ignore styles.css :root light defaults */
    --color-bg:            #111114;
    --color-surface:       #1c1c20;
    --color-border:        rgba(255,255,255,0.08);
    --color-border-strong: rgba(255,255,255,0.15);
    --color-text-1:        #f0f0f0;
    --color-text-2:        #a0a0a8;
    --color-text-3:        #666672;
    --color-bg-subtle:     #28282e;
    --color-bg-tinted:     #323238;
    --color-run-name:      #93c5fd;
    --color-warning:       #e6a817;
    --color-critical:      #c0392b;
    --color-success:       #22c55e;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--color-bg);
    color: var(--color-text-1);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  .m-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--color-border);
  }

  .m-header__left {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }

  .m-header__title {
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .m-header__run {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--color-run-name);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 140px;
  }

  .m-header__elapsed {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-text-3);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Zone grid ──────────────────────────────────────────────────── */
  .m-zones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 16px;
  }

  .m-zone {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--r-md, 8px);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.2s ease;
    min-height: 0;
  }

  .m-zone--warn  { border-color: var(--color-warning); }
  .m-zone--crit  { border-color: var(--color-critical); animation: pulse-border 1.4s ease-in-out infinite; }
  .m-zone--ok    { border-color: var(--color-border); }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--color-critical); }
    50%      { border-color: rgba(192, 57, 43, 0.3); }
  }

  .m-zone__top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .m-zone__label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-3);
  }

  .m-zone__fan {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.3;
    letter-spacing: 0.02em;
  }

  .m-zone__fan--on  { background: #1a3e1a; color: #88ee88; border: 1px solid #3a7a3a; }
  .m-zone__fan--off { background: #2a2a2a; color: #888;    border: 1px solid #555; }
  .m-zone__fan--na  { background: transparent; color: var(--color-text-3); border: 1px solid var(--color-border); }

  .m-zone__temp {
    font-size: 2.25rem;
    font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  .m-zone__unit {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--color-text-3);
    margin-left: 1px;
  }

  .m-zone__setpoint {
    font-size: 0.65rem;
    color: var(--color-text-3);
    font-variant-numeric: tabular-nums;
  }

  /* ── Environment bar ────────────────────────────────────────────── */
  .m-env {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 10px 16px;
    border-top: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
  }

  .m-env__item {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .m-env__value {
    font-size: 0.95rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .m-env__label {
    font-size: 0.7rem;
    color: var(--color-text-3);
    font-weight: 500;
  }

  /* ── Weight summary ─────────────────────────────────────────────── */
  .m-weight {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--color-border);
  }

  .m-weight[hidden] { display: none; }

  .m-weight__value {
    font-size: 0.95rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .m-weight__label {
    font-size: 0.7rem;
    color: var(--color-text-3);
    font-weight: 500;
  }

  /* ── Charts ──────────────────────────────────────────────────────── */
  .m-charts {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .m-charts[hidden] { display: none; }

  .m-chart-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--r-md, 8px);
    padding: 10px 12px;
  }

  .m-chart-card__title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-3);
    margin-bottom: 6px;
  }

  .m-chart-card canvas {
    width: 100% !important;
    height: 150px !important;
  }

  /* ── Idle state ─────────────────────────────────────────────────── */
  .m-idle {
    text-align: center;
    padding: 48px 24px;
    color: var(--color-text-3);
  }

  .m-idle__msg {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .m-idle__link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 20px;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-text-1);
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border-strong);
    border-radius: var(--r-md, 8px);
    text-decoration: none;
    transition: background 0.15s ease;
  }

  .m-idle__link:active { background: var(--color-bg-tinted); }

  /* ── Footer / timestamp ─────────────────────────────────────────── */
  .m-footer {
    text-align: center;
    padding: 12px 16px 20px;
    font-size: 0.65rem;
    color: var(--color-text-3);
    font-variant-numeric: tabular-nums;
  }

  .m-footer__stale { color: var(--color-warning); }

  /* ── Connection lost banner ─────────────────────────────────────── */
  .m-conn-lost {
    display: none;
    background: var(--color-critical);
    color: #fff;
    text-align: center;
    padding: 6px 12px;
    font-weight: 600;
    font-size: 0.8rem;
  }

  .m-conn-lost--visible { display: block; }
</style>
</head>
<body>

<div class="m-conn-lost" id="conn-lost">Connection lost</div>

<header class="m-header">
  <div class="m-header__left">
    <span class="m-header__title">SmartSake</span>
    <span class="m-header__run" id="run-name"></span>
  </div>
  <span class="m-header__elapsed" id="elapsed"></span>
</header>

<main id="main-content">
  <!-- Populated by JS on first render -->
</main>

<section class="m-charts" id="charts-section" hidden>
  <div class="m-chart-card">
    <div class="m-chart-card__title">Temperature</div>
    <canvas id="temp-chart-mobile"></canvas>
  </div>
  <div class="m-chart-card">
    <div class="m-chart-card__title">Fan Activity</div>
    <canvas id="fans-chart-mobile"></canvas>
  </div>
</section>

<footer class="m-footer" id="footer">
  <span id="last-update"></span>
</footer>

<script>
(function () {
  'use strict';

  var POLL_MS = 10000;
  var pollTimer = null;
  var pollFails = 0;
  var MAX_FAILS = 3;

  var mainEl      = document.getElementById('main-content');
  var runNameEl   = document.getElementById('run-name');
  var elapsedEl   = document.getElementById('elapsed');
  var footerEl    = document.getElementById('last-update');
  var connEl      = document.getElementById('conn-lost');
  var chartsSec   = document.getElementById('charts-section');

  // ── Chart state ───────────────────────────────────────────────────
  var tempChart = null;
  var fansChart = null;
  var chartsReady = false;
  var currentRunId = null;
  var chartLabels = [];
  // Display-unit series (what the chart consumes). Re-derived from rawTempSeries on unit change.
  var tempSeries = { t1: [], t2: [], t3: [], t4: [], t5: [], t6: [] };
  // Raw °C cache so we can re-convert when the unit toggle flips.
  var rawTempSeries = { t1: [], t2: [], t3: [], t4: [], t5: [], t6: [] };
  var fanSeries  = { f1: [], f2: [], f3: [], f4: [], f5: [], f6: [] };
  var MAX_POINTS = 360; // ~1 hour at 10s intervals

  var ZONE_COLORS = ['#e05252','#52a0e0','#52e07c','#e0c952','#c052e0','#e09052'];

  // ── Unit preferences (display-only; backend stays in °C / lbs) ────
  var LBS_TO_KG = 0.453592;
  function getUnits() {
    var w = 'lbs', t = 'C';
    try {
      w = (localStorage.getItem('sakeWeightUnit') === 'kg') ? 'kg' : 'lbs';
      t = (localStorage.getItem('sakeTempUnit')   === 'F')  ? 'F'  : 'C';
    } catch (e) {}
    return { weight: w, temp: t };
  }
  var _units = getUnits();
  function wConv(lbs) {
    if (lbs == null || isNaN(lbs)) return null;
    return _units.weight === 'kg' ? lbs * LBS_TO_KG : lbs;
  }
  function wUnitLabel() { return _units.weight === 'kg' ? 'kg' : 'lbs'; }
  function wDecimals()  { return _units.weight === 'kg' ? 2 : 1; }
  function tConv(c) {
    if (c == null || isNaN(c)) return null;
    return _units.temp === 'F' ? (c * 9/5 + 32) : c;
  }
  function tConvDelta(c) {
    if (c == null || isNaN(c)) return null;
    return _units.temp === 'F' ? c * 9/5 : c;
  }
  function tUnitLabel() { return _units.temp === 'F' ? '°F' : '°C'; }

  // ── Helpers ────────────────────────────────────────────────────────

  function fmtTemp(v) {
    // Accepts a raw °C value, returns the converted display string.
    if (v === null || v === undefined || isNaN(v)) return '--';
    var conv = tConv(Number(v));
    return Number(conv).toFixed(1);
  }

  function fmtElapsed(startISO) {
    if (!startISO) return '';
    var start = new Date(startISO);
    var diff = Math.max(0, Math.floor((Date.now() - start.getTime()) / 1000));
    var d = Math.floor(diff / 86400);
    var h = Math.floor((diff % 86400) / 3600);
    var m = Math.floor((diff % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h ' + String(m).padStart(2, '0') + 'm';
    if (h > 0) return h + 'h ' + String(m).padStart(2, '0') + 'm';
    return m + 'm';
  }

  function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var h = d.getHours();
    var m = String(d.getMinutes()).padStart(2, '0');
    var s = String(d.getSeconds()).padStart(2, '0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m + ':' + s + ' ' + ampm;
  }

  function fmtShortTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var h = d.getHours();
    var m = String(d.getMinutes()).padStart(2, '0');
    var ampm = h >= 12 ? 'p' : 'a';
    h = h % 12 || 12;
    return h + ':' + m + ampm;
  }

  function fanBadgeHTML(state) {
    if (state === 1 || state === 'on') {
      return '<span class="m-zone__fan m-zone__fan--on">ON</span>';
    }
    if (state === 0 || state === 'off') {
      return '<span class="m-zone__fan m-zone__fan--off">OFF</span>';
    }
    return '<span class="m-zone__fan m-zone__fan--na">--</span>';
  }

  function alarmClass(level) {
    if (level === 'critical') return 'm-zone--crit';
    if (level === 'warning')  return 'm-zone--warn';
    return 'm-zone--ok';
  }

  // ── Charts ─────────────────────────────────────────────────────────

  function initCharts() {
    if (chartsReady || !window.Chart) return;

    var tempCanvas = document.getElementById('temp-chart-mobile');
    var fansCanvas = document.getElementById('fans-chart-mobile');
    if (!tempCanvas || !fansCanvas) return;

    var chartFont = { family: "'Inter', system-ui, sans-serif", size: 10 };
    var gridColor = 'rgba(255,255,255,0.06)';
    var tickColor = '#666672';

    Chart.defaults.color = tickColor;
    Chart.defaults.borderColor = gridColor;

    tempChart = new Chart(tempCanvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [
          { label: 'Z1', data: tempSeries.t1, borderColor: ZONE_COLORS[0], borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          { label: 'Z2', data: tempSeries.t2, borderColor: ZONE_COLORS[1], borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          { label: 'Z3', data: tempSeries.t3, borderColor: ZONE_COLORS[2], borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          { label: 'Z4', data: tempSeries.t4, borderColor: ZONE_COLORS[3], borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          { label: 'Z5', data: tempSeries.t5, borderColor: ZONE_COLORS[4], borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          { label: 'Z6', data: tempSeries.t6, borderColor: ZONE_COLORS[5], borderWidth: 1.5, pointRadius: 0, tension: 0.3 }
        ]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { autoSkip: true, maxTicksLimit: 5, font: chartFont, color: tickColor },
            grid: { color: gridColor }
          },
          y: {
            title: { display: true, text: tUnitLabel(), font: chartFont, color: tickColor },
            ticks: { font: chartFont, color: tickColor },
            grid: { color: gridColor }
          }
        },
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: tickColor, usePointStyle: true, boxWidth: 8, font: { size: 9 }, padding: 6 }
          },
          tooltip: { enabled: false }
        }
      }
    });

    fansChart = new Chart(fansCanvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [
          { label: 'F1', data: fanSeries.f1, borderColor: ZONE_COLORS[0], borderWidth: 1.5, pointRadius: 0, stepped: true },
          { label: 'F2', data: fanSeries.f2, borderColor: ZONE_COLORS[1], borderWidth: 1.5, pointRadius: 0, stepped: true },
          { label: 'F3', data: fanSeries.f3, borderColor: ZONE_COLORS[2], borderWidth: 1.5, pointRadius: 0, stepped: true },
          { label: 'F4', data: fanSeries.f4, borderColor: ZONE_COLORS[3], borderWidth: 1.5, pointRadius: 0, stepped: true },
          { label: 'F5', data: fanSeries.f5, borderColor: ZONE_COLORS[4], borderWidth: 1.5, pointRadius: 0, stepped: true },
          { label: 'F6', data: fanSeries.f6, borderColor: ZONE_COLORS[5], borderWidth: 1.5, pointRadius: 0, stepped: true }
        ]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { autoSkip: true, maxTicksLimit: 5, font: chartFont, color: tickColor },
            grid: { color: gridColor }
          },
          y: {
            min: -0.1, max: 1.1,
            ticks: { stepSize: 1, font: chartFont, color: tickColor, callback: function(v) { return v === 0 ? 'Off' : v === 1 ? 'On' : ''; } },
            grid: { color: gridColor }
          }
        },
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: tickColor, usePointStyle: true, boxWidth: 8, font: { size: 9 }, padding: 6 }
          },
          tooltip: { enabled: false }
        }
      }
    });

    chartsReady = true;
  }

  function loadHistoricalData(runId) {
    fetch('/api/runs/' + runId + '/readings?n=360')
      .then(function (r) { return r.json(); })
      .then(function (rows) {
        if (!Array.isArray(rows) || rows.length === 0) return;

        // Clear existing data
        chartLabels.length = 0;
        for (var k in tempSeries) tempSeries[k].length = 0;
        for (var kr in rawTempSeries) rawTempSeries[kr].length = 0;
        for (var k2 in fanSeries) fanSeries[k2].length = 0;

        rows.forEach(function (row) {
          chartLabels.push(fmtShortTime(row.timestamp));
          for (var i = 1; i <= 6; i++) {
            var rawC = row['tc' + i] != null ? Number(row['tc' + i]) : null;
            rawTempSeries['t' + i].push(rawC);
            tempSeries['t' + i].push(rawC != null ? tConv(rawC) : null);
            fanSeries['f' + i].push(row['fan' + i] != null ? Number(row['fan' + i]) : null);
          }
        });

        if (chartsReady) {
          tempChart.update('none');
          fansChart.update('none');
        }
      })
      .catch(function () { /* silent — charts just won't have history */ });
  }

  function appendChartPoint(latest) {
    if (!chartsReady) return;

    var label = fmtShortTime(latest.timestamp);
    chartLabels.push(label);
    for (var i = 1; i <= 6; i++) {
      var rawC = latest['tc' + i] != null ? Number(latest['tc' + i]) : null;
      rawTempSeries['t' + i].push(rawC);
      tempSeries['t' + i].push(rawC != null ? tConv(rawC) : null);
      fanSeries['f' + i].push(latest['fan' + i] != null ? Number(latest['fan' + i]) : null);
    }

    // Trim to max points
    if (chartLabels.length > MAX_POINTS) {
      chartLabels.shift();
      for (var k in tempSeries) tempSeries[k].shift();
      for (var kr in rawTempSeries) rawTempSeries[kr].shift();
      for (var k2 in fanSeries) fanSeries[k2].shift();
    }

    tempChart.update('none');
    fansChart.update('none');
  }

  // ── Render ─────────────────────────────────────────────────────────

  function renderActive(latest, fanData, run) {
    // Header
    runNameEl.textContent = run.name || '';
    elapsedEl.textContent = fmtElapsed(run.started_at);

    var zones = (fanData && fanData.zones) ? fanData.zones : {};

    var html = '<div class="m-zones">';
    for (var i = 1; i <= 6; i++) {
      var temp = latest['tc' + i];
      var fan  = latest['fan' + i];
      var zd   = zones[String(i)] || {};
      var alarm = zd.alarm_level || null;
      var sp    = zd.setpoint;
      var cls   = alarmClass(alarm);

      var spText = '';
      if (sp !== null && sp !== undefined && isFinite(Number(sp))) {
        // Setpoint comes from server in °C; convert for display.
        spText = 'SP ' + Number(tConv(Number(sp))).toFixed(1) + tUnitLabel();
      }

      html += '<div class="m-zone ' + cls + '">'
            +   '<div class="m-zone__top">'
            +     '<span class="m-zone__label">Zone ' + i + '</span>'
            +     fanBadgeHTML(fan)
            +   '</div>'
            +   '<div class="m-zone__temp">'
            +     fmtTemp(temp)
            +     '<span class="m-zone__unit">' + tUnitLabel() + '</span>'
            +   '</div>'
            +   (spText ? '<span class="m-zone__setpoint">' + spText + '</span>' : '')
            + '</div>';
    }
    html += '</div>';

    // Environment bar
    var shtTemp  = latest.sht_temp;
    var humidity = latest.humidity;
    html += '<div class="m-env">';
    html += '<div class="m-env__item">'
          +   '<span class="m-env__value">' + fmtTemp(humidity) + '%</span>'
          +   '<span class="m-env__label">Humidity</span>'
          + '</div>';
    html += '<div class="m-env__item">'
          +   '<span class="m-env__value">' + fmtTemp(shtTemp) + tUnitLabel() + '</span>'
          +   '<span class="m-env__label">Ambient</span>'
          + '</div>';
    html += '</div>';

    // Weight summary
    var wTotal = latest.weight_total_lbs;
    if (wTotal !== null && wTotal !== undefined && wTotal > 0) {
      var wDisp = wConv(Number(wTotal));
      html += '<div class="m-weight">'
            +   '<span class="m-weight__value">' + Number(wDisp).toFixed(wDecimals()) + ' ' + wUnitLabel() + '</span>'
            +   '<span class="m-weight__label">Total weight</span>'
            + '</div>';
    }

    mainEl.innerHTML = html;

    // Show charts section and initialize if needed
    chartsSec.hidden = false;
    if (!chartsReady) {
      initCharts();
    }

    // Load history if run changed
    if (run.id && run.id !== currentRunId) {
      currentRunId = run.id;
      loadHistoricalData(run.id);
    } else {
      appendChartPoint(latest);
    }
  }

  function renderIdle() {
    runNameEl.textContent = '';
    elapsedEl.textContent = '';
    chartsReady = false;
    tempChart = null;
    fansChart = null;
    currentRunId = null;
    chartsSec.hidden = true;
    mainEl.innerHTML = '<div class="m-idle">'
      + '<p class="m-idle__msg">No active run</p>'
      + '<a class="m-idle__link" href="home.html">Open dashboard</a>'
      + '</div>';
  }

  // ── Data fetching ──────────────────────────────────────────────────

  function fetchAll() {
    var latestP  = fetch('/api/latest').then(function (r) { return r.json(); });
    var fanP     = fetch('/api/fan-state').then(function (r) { return r.json(); });
    var runP     = fetch('/api/runs/active').then(function (r) {
      if (r.status === 404) return null;
      return r.json();
    });

    Promise.all([latestP, fanP, runP])
      .then(function (results) {
        var latest  = results[0];
        var fanData = results[1];
        var run     = results[2];

        pollFails = 0;
        connEl.classList.remove('m-conn-lost--visible');

        if (!run || run.error) {
          renderIdle();
        } else {
          renderActive(latest, fanData, run);
        }

        // Footer timestamp
        var ts = latest.timestamp || null;
        if (ts) {
          var age = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
          var cls = age > 60 ? ' class="m-footer__stale"' : '';
          footerEl.innerHTML = '<span' + cls + '>Updated ' + fmtTime(ts) + '</span>';
        } else {
          footerEl.textContent = '';
        }
      })
      .catch(function () {
        pollFails++;
        if (pollFails >= MAX_FAILS) {
          connEl.classList.add('m-conn-lost--visible');
        }
      });
  }

  // ── Polling lifecycle ──────────────────────────────────────────────

  function startPolling() {
    fetchAll();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(fetchAll, POLL_MS);
  }

  function stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      stopPolling();
    } else {
      startPolling();
    }
  });

  // ── Unit-change listener ──────────────────────────────────────────
  // Settings modal (customize.js) writes localStorage then dispatches this.
  // Re-read units, recompute display series from raw °C cache, refresh chart
  // axis title, and trigger a fresh render of the latest data.
  function onUnitsChanged() {
    _units = getUnits();
    // Re-derive display-unit temp series from raw °C cache
    for (var i = 1; i <= 6; i++) {
      var raw = rawTempSeries['t' + i];
      var disp = tempSeries['t' + i];
      disp.length = 0;
      for (var j = 0; j < raw.length; j++) {
        disp.push(raw[j] != null ? tConv(raw[j]) : null);
      }
    }
    if (tempChart) {
      tempChart.options.scales.y.title.text = tUnitLabel();
      tempChart.update('none');
    }
    // Trigger a re-fetch so all live text values redraw with the new unit
    fetchAll();
  }
  window.addEventListener('sake-units-changed', onUnitsChanged);
  // Also catch unit toggles flipped in another tab (cross-tab localStorage event)
  window.addEventListener('storage', function (e) {
    if (e.key === 'sakeWeightUnit' || e.key === 'sakeTempUnit') onUnitsChanged();
  });

  // ── Init ───────────────────────────────────────────────────────────
  startPolling();
})();
</script>
